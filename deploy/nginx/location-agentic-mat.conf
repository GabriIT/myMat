# Add this inside an existing `server {}` block that already serves 154.12.245.254.

location = /agentic-mat {
    return 301 /agentic-mat/;
}

location /agentic-mat/api/ {
    proxy_pass http://127.0.0.1:18100/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /agentic-mat/ {
    proxy_pass http://127.0.0.1:18101/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
